name: Build Validation

on:
  pull_request:
    branches: ["**"]
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          include-prerelease: true

      - name: Install MAUI workload
        run: dotnet workload install maui --skip-manifest-update

      - name: Restore
        run: dotnet restore BP.PriceTracker.sln -p:TargetFramework=net10.0-android

      - name: Build solution
        run: dotnet build BP.PriceTracker.sln --configuration Release --no-restore -p:TargetFramework=net10.0-android
