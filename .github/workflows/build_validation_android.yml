name: Build Validation

on:
  pull_request:
    branches: ["**"]
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        framework: [net10.0-android, net10.0-windows10.0.19041.0]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          include-prerelease: true

      - run: dotnet workload install maui --skip-manifest-update

      - run: dotnet restore BP.PriceTracker.sln

      - run: dotnet build BP.PriceTracker.sln --configuration Release --no-restore -p:TargetFramework=${{ matrix.framework }}
